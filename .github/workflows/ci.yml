# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: ["publish"]
  pull_request:
    branches: ["publish"]

jobs:
  # Main build job that runs on Ubuntu and performs CI for both backend (.NET) and frontend (Node.js)
  build:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code
      - uses: actions/checkout@v4

      # Install the .NET SDK (version 10.0.x) needed to build the backend
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Download and restore all NuGet dependencies for the .NET project
      - name: Restore dependencies
        run: dotnet restore

      # Compile the .NET solution (skip restore since dependencies were already downloaded)
      - name: Build
        run: dotnet build --no-restore

      # Debug step to show current working directory and directory contents
      - name: Debug working directory
        run: |
          pwd
          ls -la

      # Install Node.js runtime (version 22) needed to build the React frontend
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache-dependency-path: Frontend/package-lock.json
          cache: "npm"

      # Install npm dependencies for the frontend project using clean install (package-lock.json enforced)
      - name: Restore npm dependencies
        working-directory: Frontend
        run: npm ci

      # Build the React frontend project (creates optimized production build)
      - name: Build npm
        working-directory: Frontend
        run: npm run build

      # Run the dotnet server in the background for testing
      - name: Run dotnet server
        working-directory: Server
        run: |
          dotnet run &
          sleep 5
          # Optional: Add health check or tests here
          echo "Server started"

      # Install npm dependencies for system tests
      - name: Install test dependencies
        working-directory: Testing/SystemTests
        run: npm ci && npx playwright install

      # Run all tests (unit, API, and UI)
      - name: Run unit tests
        id: unit_tests
        continue-on-error: true
        run: dotnet test --logger "trx;LogFileName=unit-tests.trx" --results-directory TestResults

      - name: Run api tests
        id: api_tests
        continue-on-error: true
        working-directory: Testing/SystemTests
        run: npm run test:api:ci

      - name: Run system tests
        id: ui_tests
        continue-on-error: true
        working-directory: Testing/SystemTests
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_FILE: test-results/playwright-ui.xml
        run: |
          npm run bdd:gen
          npx playwright test --project=ui --reporter=list,junit

      # Create a markdown report and publish it to the run summary.
      # The same markdown file is also uploaded as an artifact for later download.
      - name: Create markdown test report
        if: ${{ always() }}
        run: |
          mkdir -p TestResults
          report="TestResults/test-report.md"

          echo "# CI Test Report" > "$report"
          echo "" >> "$report"
          echo "- Workflow: ${{ github.workflow }}" >> "$report"
          echo "- Run: #${{ github.run_number }}" >> "$report"
          echo "- Commit: ${{ github.sha }}" >> "$report"
          echo "" >> "$report"
          echo "## Suite Status" >> "$report"
          echo "- Unit: ${{ steps.unit_tests.outcome }}" >> "$report"
          echo "- API: ${{ steps.api_tests.outcome }}" >> "$report"
          echo "- UI: ${{ steps.ui_tests.outcome }}" >> "$report"
          echo "" >> "$report"
          echo "## Result Files" >> "$report"
          find TestResults Testing/SystemTests/test-results -type f 2>/dev/null | sed 's/^/- /' >> "$report" || true

          cat "$report" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload markdown test report
        id: upload_markdown_report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-report-markdown
          path: TestResults/test-report.md
          if-no-files-found: error

      - name: Upload raw test result files
        id: upload_raw_test_results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results-raw
          path: |
            TestResults/**/*.trx
            Testing/SystemTests/test-results/**/*.xml
          if-no-files-found: warn

      # Add clickable links in the GitHub run summary so reports are easy to open.
      - name: Add report links to summary
        if: ${{ always() }}
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Report Links" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Workflow run artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Markdown test report artifact](${{ steps.upload_markdown_report.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Raw test result files artifact](${{ steps.upload_raw_test_results.outputs.artifact-url }})" >> "$GITHUB_STEP_SUMMARY"

      # Tests failure gate
      - name: Fail workflow if any test suite failed
        if: ${{ always() }}
        run: |
          if [ "${{ steps.unit_tests.outcome }}" != "success" ] || \
             [ "${{ steps.api_tests.outcome }}" != "success" ] || \
             [ "${{ steps.ui_tests.outcome }}" != "success" ]; then
            echo "One or more test suites failed."
            exit 1
          fi
