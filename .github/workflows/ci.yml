name: .NET

on:
  push:
    branches: ["security-gates"]
  pull_request:
    branches: ["security-gates"]

jobs:
  # Job 0: SECURITY - Secrets scan för att tidigt fånga läckta nycklar i repo/historik.
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gitleaks failar jobbet om hemligheter hittas.
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 1: Bygger backend + frontend och publicerar artefakter som andra jobb kan använda.
  build:
    runs-on: ubuntu-latest

    steps:
      # Hämta källkoden.
      - uses: actions/checkout@v4

      # Installera .NET 8 SDK (matchar projektets net8.0-target).
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Cacha NuGet-paket för snabbare restores mellan körningar och workflows.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Restore innan build/test så project.assets.json alltid finns.
      - name: Restore dependencies
        run: dotnet restore

      # SECURITY - Dependency gate för .NET (transitiva inkluderade).
      # Failar om rapporten innehåller High/Critical.
      - name: Scan .NET dependencies for vulnerabilities
        run: |
          dotnet list Server/EverySecondLetter.csproj package --vulnerable --include-transitive > dotnet-vulnerabilities.txt
          cat dotnet-vulnerabilities.txt
          if grep -Eiq "(Critical|High)" dotnet-vulnerabilities.txt; then
            echo "High/Critical vulnerabilities found in .NET dependencies."
            exit 1
          fi

      # Kompilera backend utan ny restore (snabbare).
      - name: Build
        run: dotnet build --no-restore

      # Installera Node.js och aktivera npm-cache via lockfiler.
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: |
            Frontend/package-lock.json
            Testing/SystemTests/package-lock.json

      # Installera frontend-beroenden deterministiskt.
      - name: Install frontend dependencies
        working-directory: Frontend
        run: npm ci

      # SECURITY - Dependency gate för frontend (npm).
      - name: Scan frontend npm dependencies
        working-directory: Frontend
        run: npm audit --audit-level=high

      # SECURITY - Informativ scan för testverktyg (npm i systemtester).
      # Detta är non-blocking eftersom vulnerabilities här ofta ligger i newman-kedjan.
      - name: Scan system test npm dependencies
        id: scan_systemtests_npm
        continue-on-error: true
        working-directory: Testing/SystemTests
        run: npm audit --audit-level=high --json > npm-audit-systemtests.json

      # Publicera systemtest-audit som artefakt för enkel nedladdning i GitHub.
      - name: Upload system test npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: systemtests-npm-audit
          path: Testing/SystemTests/npm-audit-systemtests.json
          if-no-files-found: warn

      # Lägg till tydlig status i run summary utan att blockera build.
      - name: Add system test npm audit status to summary
        if: always()
        run: |
          echo "## Security gates (build-jobb)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend npm audit: blocking (high+)" >> "$GITHUB_STEP_SUMMARY"
          echo "- SystemTests npm audit: ${{ steps.scan_systemtests_npm.outcome }} (non-blocking, se artifact systemtests-npm-audit)" >> "$GITHUB_STEP_SUMMARY"

      # Bygg frontend till Server/wwwroot (via Vite outDir-konfiguration).
      - name: Build frontend
        working-directory: Frontend
        run: npm run build

      # Publicera backend för artefakt/dokumentation (visar artifact-flöde i pipelinen).
      - name: Publish backend
        run: dotnet publish Server/EverySecondLetter.csproj -c Release -o out --no-restore

      # Ladda upp publish-output som artefakt.
      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-publish
          path: out/

      # Ladda upp byggd frontend så testjobb kan återanvända den utan rebuild.
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-wwwroot
          path: Server/wwwroot/

      # Docker-bygge som validering av containerisering (ingen push här).
      # Deploy-workflown återanvänder inte detta bygge utan triggar bara Render,
      # som gör sin egen source-based rebuild från repot vid deployment.
      - name: Validate Docker build
        run: docker build -t every-second-letter:ci .

      # SECURITY - Container security gate: faila på CRITICAL findings.
      - name: Scan Docker image with Trivy (CRITICAL)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.63.0 image \
            --severity CRITICAL \
            --exit-code 1 \
            every-second-letter:ci

  # Job 2: Kör testsviter i matris (parallellt) och visar villkorlig körning.
  tests:
    needs: [security, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, api, ui]

    steps:
      # Hämta källkod för testjobbet.
      - uses: actions/checkout@v4

      # Hämta artefakt från build-jobbet (job dependency + artifacts i praktiken).
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-wwwroot
          path: Server/wwwroot/

      # .NET behövs för unit tests och för att starta API:t i api/ui-sviter.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # NuGet-cache även i testjobbet för snabbare restore.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Restore igen i nytt jobb eftersom varje jobb kör i ren runner-miljö.
      - name: Restore .NET dependencies
        run: dotnet restore

      # Node/npm behövs för API/UI-systemtester.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: Testing/SystemTests/package-lock.json

      # Installera testverktyg för API/UI (hoppas över på unit-matrisen via villkor).
      - name: Install system test dependencies
        if: ${{ matrix.suite != 'unit' }}
        working-directory: Testing/SystemTests
        run: npm ci && npx playwright install

      # Unit-testsvit med TRX-rapport.
      - name: Run unit tests
        if: ${{ matrix.suite == 'unit' }}
        run: dotnet test --logger "trx;LogFileName=unit-tests.trx" --results-directory TestResults

      # API-testsvit: starta server i bakgrunden, kör sedan Newman med JUnit-output.
      - name: Run API tests
        if: ${{ matrix.suite == 'api' }}
        run: |
          dotnet run --project Server/EverySecondLetter.csproj --urls http://localhost:5010 &
          sleep 8
          cd Testing/SystemTests
          npm run test:api:ci

      # UI-testsvit:
      - name: Run UI tests
        if: ${{ matrix.suite == 'ui' }}
        run: |
          dotnet run --project Server/EverySecondLetter.csproj --urls http://localhost:5010 &
          sleep 8
          cd Testing/SystemTests
          npm run test:ui

      # Ladda upp testresultat även om tester fallerar, så rapportjobb alltid kan läsa dem.
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.suite }}
          path: |
            TestResults/**
            Testing/SystemTests/test-results/**
            Testing/SystemTests/playwright-report/**
          if-no-files-found: ignore

  # Job 3: Rapporteringsjobb som alltid körs och summerar artefakter/resultat.
  report:
    needs: tests
    if: always()
    runs-on: ubuntu-latest

    steps:
      # Hämta alla testartefakter från matrisjobben.
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          path: artifacts/
          merge-multiple: true

      # Skapa en enkel pipeline-rapport i GitHub Step Summary.
      - name: Publish pipeline summary
        run: |
          echo "## CI Rapport" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build-jobb: klart" >> "$GITHUB_STEP_SUMMARY"
          echo "- Testmatris: unit/api/ui körda parallellt (UI endast på push)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Nedladdade artefakter:" >> "$GITHUB_STEP_SUMMARY"
          find artifacts -type f | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"
