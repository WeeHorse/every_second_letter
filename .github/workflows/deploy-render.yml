name: Deploy to Render

on:
  workflow_run:
    workflows: [".NET"]
    types: [completed]
    branches: ["disabled_publish"]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # This workflow intentionally does not rebuild or retest the app.
      # CI in .github/workflows/ci.yml already restores, builds, tests, and validates
      # the Dockerfile. After CI succeeds on the publish branch, this workflow only
      # tells Render to start its own source-based deployment.

      # Trigger a Render deployment by calling the deploy hook.
      # Render then clones the repository and rebuilds the container from Dockerfile.
      # The RENDER_DEPLOY_HOOK_URL secret must be set in the GitHub repo settings.
      - name: Trigger Render deployment
        run: |
          curl --fail-with-body -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
